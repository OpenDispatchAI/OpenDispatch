skill_id: apple_shortcuts
name: Apple Shortcuts
version: 1.0.0
built_in: true

actions:
  - id: shortcut.run
    title: "Run Shortcut"
    description: "Run an Apple Shortcut by name"
    confirmation: required
    parameters:
      - name: name
        type: string
        required: true
    examples:
      - run my morning routine shortcut
      - execute the backup shortcut
      - run the shortcut called clean downloads
      - start the bedtime shortcut
      - trigger my commute shortcut
      - run automation for lights
      - launch the workout shortcut
      - execute my daily report shortcut
    negative_examples:
      - remind me to run the report
      - schedule my morning routine
      - make a note about the backup
