skill_id: ticktick
name: TickTick
version: 1.0.0

actions:
  - id: task.create
    title: "Add Task"
    description: "Add a task to TickTick"
    confirmation: required
    shortcut_arguments:
      title: "{{title}}"
    parameters:
      - name: title
        type: string
        description: "The task title"
        required: true
    examples:
      - ticktick buy milk
      - add this to ticktick
      - add to my todo list
      - add task buy groceries
